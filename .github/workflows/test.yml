name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  decision-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - run: python3 scripts/test_decision_state.py
